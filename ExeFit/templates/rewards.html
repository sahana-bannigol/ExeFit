        // Connect MetaMask
        async function connectMetaMask() {
            if (window.ethereum) {
                try {
                    await window.ethereum.request({ method: "eth_requestAccounts" });
                    web3 = new Web3(window.ethereum);
                    const accounts = await web3.eth.getAccounts();
                    userAccount = accounts[0];
                    document.getElementById("walletAddress").innerText = `Connected: ${userAccount}`;
                    contract = new web3.eth.Contract(ABI, CONTRACT_ADDRESS);
                } catch (error) {
                    console.error("User denied MetaMask connection", error);
                }
            } else {
                alert("MetaMask not found. Please install MetaMask.");
            }
        }

        // Call the smart contract function
        async function creditReward() {
            if (!web3 || !contract || !userAccount) {
                alert("Please connect MetaMask first!");
                return;
            }

            const userAddress = document.getElementById("user_address").value;
            const rewardAmount = document.getElementById("amount").value;

            if (!web3.utils.isAddress(userAddress)) {
                alert("Invalid Ethereum address!");
                return;
            }

            document.getElementById("status").innerText = "Processing transaction...";

            try {
                const tx = await contract.methods.creditReward(userAddress, rewardAmount)
                    .send({ from: userAccount });

                document.getElementById("status").innerText = `Transaction successful! TX Hash: ${tx.transactionHash}`;
            } catch (error) {
                document.getElementById("status").innerText = "Transaction failed!";
                console.error(error);
            }
        }
