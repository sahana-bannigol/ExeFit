services:
  - type: web
    name: sports-park
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn sports_park.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: sports-park-db
          property: connectionString
      - key: WEB3_PROVIDER
        value: "https://mainnet.infura.io/v3/2b48b0d768a245e4a2666969b9f06fc6"

databases:
  - name: sports-park-db
    plan: free
